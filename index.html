<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,Arial,sans-serif}body{background:#0c0c0c;color:#fff}
header{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;padding:18px 28px;background:rgba(10,10,10,.95);backdrop-filter:blur(10px);border-bottom:1px solid #ff7a00}
.logo{font-size:30px;font-weight:800;color:#ff7a00}.cartbtn{background:#ff7a00;color:#111;padding:10px 18px;border-radius:30px;cursor:pointer;font-weight:700}
.hero{padding:90px 20px;text-align:center;background:radial-gradient(circle at top,#4a2500,#0c0c0c)}.hero h1{font-size:58px;color:#ff9a2f}.hero p{color:#ddd;margin:12px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;padding:35px}
.card{background:#171717;border:1px solid #2b2b2b;border-radius:18px;overflow:hidden;transition:.3s}.card:hover{transform:translateY(-8px);box-shadow:0 0 25px rgba(255,122,0,.4)}
.card img{width:100%;height:220px;object-fit:cover}.info{padding:16px}.price{color:#ff7a00;font-size:24px}.btn{padding:10px 14px;margin-top:8px;border:none;border-radius:8px;background:#ff7a00;color:#111;font-weight:bold;cursor:pointer}
#drawer{position:fixed;right:-360px;top:0;width:340px;height:100%;background:#121212;padding:20px;transition:.3s;overflow:auto;box-shadow:-10px 0 30px #000}
.close{float:right;background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
.review{background:#171717;margin:12px;padding:16px;border-left:4px solid #ff7a00;border-radius:10px}
input,textarea{width:100%;padding:10px;margin:8px 0;background:#222;color:#fff;border:1px solid #333}
footer{text-align:center;padding:30px;color:#aaa}
</style></head><body>
<header><div class=logo>Luxury Product</div><div class=cartbtn onclick='toggleCart()'>🛒 Cart (<span id=n>0</span>)</div></header>
<section class=hero><h1>ZnZ Brotherz DROPHUB</h1><p>Elegant. Premium. Modern.</p></section>
<div class=grid id=products></div>
<h2 style='padding:20px;color:#ff7a00'>Customer Reviews</h2>
<div id=reviews><div class=review>⭐⭐⭐⭐⭐ <b>Ali Khan</b><br>Amazing quality and premium look.</div><div class=review>⭐⭐⭐⭐⭐ <b>Ahsan Raza</b><br>Fast delivery and excellent support.</div></div>
<div style='padding:20px'><input id=name placeholder='Your name'><textarea id=msg placeholder='Write a review'></textarea><button class=btn onclick='addReview()'>Submit Review</button></div>
<div id=drawer><button class=close onclick='toggleCart()'>&times;</button><h2>Shopping Cart</h2><div id=list></div><h3>Total: Rs.<span id=total>0</span></h3><button class=btn onclick='checkout()'>Purchase</button></div>
<footer>© Luxora Premium Store</footer>
<script>
const products = [
{
name: "Luxury Smart Watch",
price: 3499,
image: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=700&auto=format&fit=crop"
},
{
name: "Wireless Earbuds",
price: 2899,
image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30?w=700&auto=format&fit=crop"
},
{
name: "Running Shoes",
price: 5299,
image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=700&auto=format&fit=crop"
}
];

let cart = [];

const productsBox = document.getElementById("products");

productsBox.innerHTML = "";

products.forEach((item,index)=>{

productsBox.innerHTML += `
<div class="card">

<img src="${item.image}" alt="${item.name}">

<h3>${item.name}</h3>

<p style="color:#ff7a00;font-size:22px;">
Rs. ${item.price}
</p>

<button class="orange"
onclick="addCart(${index})">
Add to Cart
</button>

<button class="orange"
onclick="quickView(${index})">
View
</button>

<button class="orange"
onclick="buyNow(${index})">
Buy Now
</button>

</div>
`;

});

function addCart(index){

cart.push(products[index]);

updateCart();

alert("Added to cart");

}

function buyNow(index){

cart=[products[index]];

updateCart();

checkout();

}

function updateCart(){

cnt.innerHTML=cart.length;

let total=0;

list.innerHTML="";

cart.forEach((item,index)=>{

total+=item.price;

list.innerHTML+=`
<div style="margin-bottom:12px">

<b>${item.name}</b>

<br>

Rs.${item.price}

<button
style="float:right"
onclick="removeItem(${index})">

❌

</button>

</div>
`;

});

tot.innerHTML=total;

}

function removeItem(index){

cart.splice(index,1);

updateCart();

}

function toggleCart(){

const drawer=document.getElementById("cart");

drawer.style.right=

drawer.style.right==="0px"

?

"-320px"

:

"0px";

}

function checkout(){

if(cart.length===0){

alert("Your cart is empty.");

return;

}

let total=0;

let message="Hello,%0AI want to order:%0A%0A";

cart.forEach(item=>{

message+=item.name+" - Rs."+item.price+"%0A";

total+=item.price;

});

message+="%0ATotal : Rs."+total;

window.open(

"https://wa.me/923410502701?text="+message,

"_blank"

);

}

function quickView(index){

box.innerHTML=`

<img
src="${products[index].image}"
style="width:100%;border-radius:10px;">

<h2>${products[index].name}</h2>

<h3 style="color:#ff7a00;">

Rs.${products[index].price}

</h3>

<p>

Premium quality product.

Fast Delivery.

100% Original.

</p>

`;

modal.style.display="block";

}

function hide(){

modal.style.display="none";

}

function addReview(){

if(n.value==""||t.value==""){

alert("Write your review.");

return;

}

reviews.innerHTML+=`

<div class="review">

⭐⭐⭐⭐⭐

<b>${n.value}</b>

<br>

${t.value}

</div>

`;

n.value="";

t.value="";

}
</script>
